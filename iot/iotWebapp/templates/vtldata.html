<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>首页</title>
<!-- 新 Bootstrap 核心 CSS 文件 -->
<link rel="stylesheet" href="../static/css/bootstrap.min.css">
<!-- jQuery文件。务必在bootstrap.min.js 之前引入 -->
<script src="../static/js/jquery.min.js"></script>
<!-- 最新的 Bootstrap 核心 JavaScript 文件 -->
<script src="../static/js/bootstrap.min.js"></script>
<style>
    .row-label{
        line-height: 34px;
        font-size: 16px;
    }
    .row-label>span{
        font-style: italic;
        font-weight: bold;
    }
</style>
</head>
<body style="padding: 10px">
<div style="margin-bottom: 10px">
    <input class="form-control" id="url"
           style="width: 377px; display: inline-block"
           value="http://127.0.0.1:{{myport}}/api/gpio/"
           placeholder="请输入地址测试"/>
    <button class="btn btn-success" onclick="ajaxSubmit()"
            style="vertical-align: top">测试</button>
</div>
    <div class="row-label"><span>1. 大棚顶棚</span> (greenhouse)：{{greenhouse}}状态</div>
    <div class="row-label"><span>2. 水肥机</span> (water)：{{water}}状态</div>
    <div class="row-label"><span>3. 补光灯</span> (led)：{{led}}状态</div>
    <div class="row-label"><span>4. 排风机</span> (fan)：{{fan}}状态</div>
</body>
<script>
    function ajaxSubmit() {
        var url = document.getElementById('url').value
        $.getJSON(url, data=>window.location.reload())
    }
</script>
</html>
