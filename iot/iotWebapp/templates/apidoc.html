<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>首页</title>
<!-- 新 Bootstrap 核心 CSS 文件 -->
<link rel="stylesheet" href="../static/css/bootstrap.min.css">
<!-- jQuery文件。务必在bootstrap.min.js 之前引入 -->
<script src="../static/js/jquery.min.js"></script>
<!-- 最新的 Bootstrap 核心 JavaScript 文件 -->
<script src="../static/js/bootstrap.min.js"></script>
<script src="../static/js/jquery.ajaxupload.js"></script>
<script>
    window.onload = function () {
        $.ajaxUploadSettings.name = 'file'
        $('#upload').ajaxUploadPrompt({
            url: '/sysmgr/logo',
            success(data) {
                window.location.reload()
            }
        })
    }

    function setWidth() {
        var width = $('#width').val()
        var apiImage = document.getElementById('apiImage')
        if (isNaN(width)) {
            return alert('请输入宽度数值')
        }
        apiImage.style.maxWidth = width + 'px'
        apiImage.style.width = width + 'px'
    }
</script>
</head>
<body style="padding: 12px; text-align: center">
    <button id="upload" class="btn btn-success"
        style="vertical-align: top">上传文档截图</button>
    &nbsp;
    <span style="line-height: 34px">Api文档，请自己编写和上传</span>
    &nbsp;
    <input id="width" class="form-control"
           style="width: 70px; vertical-align: top;
           display: inline-block"/>
    <button class="btn" onclick="setWidth()"
            style="vertical-align: top">宽度</button>
    <div style="margin-top: 5px">
        <img id="apiImage"
             src="{{apiImage}}"
             style="max-width: 750px;
             border: 1px solid #ddd"/>
    </div>

</body>
</html>
