<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>首页</title>
<!-- 新 Bootstrap 核心 CSS 文件 -->
<link rel="stylesheet" href="../static/css/bootstrap.min.css">
<!-- jQuery文件。务必在bootstrap.min.js 之前引入 -->
<script src="../static/js/jquery.min.js"></script>
<!-- 最新的 Bootstrap 核心 JavaScript 文件 -->
<script src="../static/js/bootstrap.min.js"></script>
<style>
    .form-input {
        width: 350px;
        margin-top: 10px;
        display: inline-block;
    }
    .form-placeholder {
        margin-left: 5px;
        line-height: 34px;
        height: 34px;
    }
</style>
</head>
<body style="padding: 12px; overflow: hidden">
    <div>注意[ThingsCloud] mqtt云平台服务器<font color="red">|可以不用</font></div>
    <div style="margin-top: 5px">1. mqtt服务器(不填USERNAME mqtt就关闭了)</div>
    <div>
        <input class="form-control form-input"
               id="USERNAME" value="{{ USERNAME }}"
               placeholder="请输入USERNAME"/>
        <span class="form-placeholder">USERNAME</span>
    </div>
    <div>
        <input class="form-control form-input"
               id="PASSWORD" value="{{ PASSWORD }}"
               placeholder="请输入PASSWORD"/>
        <span class="form-placeholder">PASSWORD</span>
    </div>
    <div>
        <input class="form-control form-input"
               id="CLIENT_ID" value="{{ CLIENT_ID }}"
               placeholder="请输入设备ID"/>
        <span class="form-placeholder">设备ID</span>
    </div>
    <div>
        <input class="form-control form-input"
               id="TC_HOST" value="{{ TC_HOST }}"
               placeholder="请输入mqtt服务器地址">
        <span class="form-placeholder" style="color: red">mqtt服务器地址</span>
    </div>
    <div style="height: 20px"></div>
    <div>2. [timer] 设置 多长时间采集一次数据<font color="red">|可以不动</font></div>
    <div>
        <input class="form-control form-input"
               id="TIMER" value="{{ TIMER }}"
               placeholder="请输入TIMER">
        <span class="form-placeholder">TIMER</span>
    </div>
    <button class="btn btn-success"
            onclick="submitParams()"
            style="margin-top: 30px;
            width: 350px">提交保存</button>
<script>
    function fetchValue(id) {
        return document.getElementById(id).value.trim()
    }
    function submitParams() {
        var CLIENT_ID = fetchValue('CLIENT_ID')
        var USERNAME = fetchValue('USERNAME')
        var TIMER = fetchValue('TIMER')
        var TC_HOST = fetchValue('TC_HOST')
        var PASSWORD = fetchValue('PASSWORD')
        if (isNaN(TIMER) || parseInt(TIMER) <= 0 ||
           (TIMER + '').indexOf('.') !== -1) {
           var alertMsg = 'TIMER必须是1个大于0的数字，且不能是小数'
           return alert(alertMsg)
        }
        location.href = '/startMqtt?'+
            'CLIENT_ID='+CLIENT_ID+
            '&USERNAME='+USERNAME+
            '&PASSWORD='+PASSWORD+
            '&TC_HOST='+TC_HOST+'&TIMER='+TIMER
    }
</script>
</body>
</html>
