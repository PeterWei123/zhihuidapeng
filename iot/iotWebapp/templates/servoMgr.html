<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>首页</title>
<!-- 新 Bootstrap 核心 CSS 文件 -->
<link rel="stylesheet" href="../static/css/bootstrap.min.css">
<!-- jQuery文件。务必在bootstrap.min.js 之前引入 -->
<script src="../static/js/jquery.min.js"></script>
<!-- 最新的 Bootstrap 核心 JavaScript 文件 -->
<script src="../static/js/bootstrap.min.js"></script>
<style>
    .form-input {
        width: 170px;
        display: inline-block;
    }
    .important {
        font-size: 16px;
        font-weight: bold;
        font-style: italic;
    }
</style>
</head>
<body style="padding: 12px; overflow: hidden">
    <div class="important">[配合硬件: 舵机] 开合角度参数调整<font color="red">|已调好了不动</font></div>
    <div style="margin-top: 15px">
        <input class="form-control form-input"
               id="close" value="{{ close }}"/>
        <input class="form-control form-input"
               id="open" value="{{ open }}" style="margin-left: 5px"/>
    </div>
    <div style="margin-top: 20px">
        <button class="btn btn-success"
                style="width: 350px" onclick="submitAngle()">保存即可生效</button>
    </div>
    <script>
        function submitAngle() {
            var open = document.getElementById('open').value
            var close = document.getElementById('close').value
            if (isNaN(open) || isNaN(close)) {
                alert('角度参数必须填写数字')
                return
            }
            open = parseInt(open)
            close = parseInt(close)
            if (open < 0 || open > 180 || close < 0 || close > 180) {
                alert('角度必须在0~180度之间')
                return
            }
            location.href = '/api/servo/'+close+'/'+open
        }
    </script>
</body>
</html>
