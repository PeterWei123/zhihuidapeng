<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title></title>
    <link rel="stylesheet" href="css/bootstrap.css"/>
    <script src="js/jquery-1.11.1.min.js"></script>
    <style>
	    html,body{
            width: 100%;
            height: 100%;
        }
        .table{
            width: 750px;
            margin: 0 auto;
            margin-top: 10%;
        }
        .table>tbody>tr>td{
            border: 0;
        }
        .title{
            text-align: center;
            font-size: 40px;
            color: white;
        }
        .bg{
            background-image: url(img/raspberry.jpg);
            width: 100%;
            height: 100%;
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }
        .form { /* 相对于浏览器进行定位 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
        }
    </style>
    <script>
        var time = 3;
        function callMobile(form) {
            // 什么都不用写
			// 虚拟登录测试
			form.action = '/user/login'
            return true; // 提交表单
        }
        
        window.onload = function () {
            var submit = document.getElementById('submit')
            var username = document.getElementById('username')
            setInterval(()=>{
                time--
                username.value = '请直接点击登录 ' + time + 's'
                if (time == 0) {
                    submit.click()
                }
            }, 1000)
        }
    </script>
</head>
<body>
    <!-- 背景图 + 表单 -->
    <div class="bg"></div>
    <form class="form" method="post" action="" onsubmit="return callMobile(this)">
        <table class="table">
            <tr><td colspan="3" class="title">IOT设备上的web服务</td></tr>
            <tr><td colspan="3" style="height: 20px;"></td></tr>
            <tr>
                <td>
                    <input type="text"
                           readonly
                           class="form-control input-lg"
                           value="默认账号 iotAdmin"/>
                </td>
                <td>
                    <input type="text" 
                           name="username" 
                           class="form-control input-lg"
                           id="username"
                           placeholder="请输入用户名" 
                           value="请直接点击登录 3s"/>
                </td>
                <td>
                    <button type="submit" id="submit"
                            class="btn btn-success btn-lg">快速登录</button>

                </td>
            </tr>
        </table>
    </form>
</body>
</html>
